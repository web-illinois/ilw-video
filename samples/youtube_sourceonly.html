<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Component</title>
    <link rel="stylesheet" href="https://cdn.brand.illinois.edu/illinois.css">
    <link rel="stylesheet" href="https://cdn.toolkit.illinois.edu/ilw-global/3/ilw-global.css">
    <script type="module" src="/src/ilw-video.ts"></script>
</head>

<script>
    document.addEventListener("DOMContentLoaded", function (event) {
        const params = new URLSearchParams(window.location.search);
        document.querySelectorAll("ilw-video").forEach(component => {
            if (params.has('aspectratio')) {
                component.setAttribute('aspectratio', params.get('aspectratio'));
            }
        });
    });
</script>

<body>
    <main>
        <div class="container" style="margin: 0 auto; padding: 0; max-width: 1200px;">
            <ilw-video src="https://www.youtube.com/watch?v=pW8cNXyAqyI" title="Progress isn't Quiet at Illinois">
            </ilw-video>
    </main>
</body>

</html>
